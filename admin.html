<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - YNK Consulting Q&A</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy-brand: #002366;
            --white: #ffffff;
            --text-dark: #2d3748;
            --background-light: #f8fafc;
            --primary-color: #2B59C3;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--background-light);
            color: var(--text-dark);
        }

        .header {
            background-color: var(--navy-brand);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 2rem;
        }

        /* Login Form */
        #login-section {
            max-width: 400px;
            margin: 10vh auto;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn {
            background-color: var(--navy-brand);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
        }

        .btn:hover {
            background-color: #001a4d;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Dashboard */
        #dashboard-section {
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #edf2f7;
            font-weight: 600;
            color: #4a5568;
        }

        tr:hover {
            background-color: #f7fafc;
        }

        .status-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-waiting {
            background-color: #feebc8;
            color: #c05621;
        }

        .status-answered {
            background-color: #c6f6d5;
            color: #22543d;
        }

        /* Modal Info */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #a0aec0;
        }

        .post-detail {
            margin-bottom: 1.5rem;
        }

        .post-detail strong {
            display: inline-block;
            width: 80px;
            color: #718096;
        }

        .post-content-box {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            margin-top: 0.5rem;
            min-height: 100px;
            white-space: pre-wrap;
        }

        .answer-area {
            margin-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }

        .answer-area textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
            min-height: 150px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .private-notice {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #e53e3e;
            font-size: 0.85rem;
            font-weight: 600;
            background: #fff5f5;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>YNK Consulting Q&A Admin</h1>
        <button id="logout-btn" class="btn-outline" style="display: none;">Logout</button>
    </header>

    <!-- Login Section -->
    <div id="login-section" class="card">
        <h2 style="text-align: center; margin-top: 0; color: var(--navy-brand);">Admin Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="admin-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-password" required>
            </div>
            <p id="login-error" style="color: #e53e3e; font-size: 0.85rem; display: none;">Invalid credentials.</p>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="container">
        <div class="card">
            <h2>Q&A Management</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Security</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <!-- Data will be populated here by Firebase -->
                    <tr>
                        <td colspan="7" style="text-align:center;">Loading data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Detail/Answer Modal -->
    <div id="post-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Question Details</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div id="modal-post-info">
                <!-- Injected via JS -->
            </div>
            <div class="answer-area">
                <h3 style="margin-top:0; font-size: 1.1rem; color: var(--navy-brand);">Write Answer</h3>
                <textarea id="admin-answer-text" placeholder="Type your answer here..."></textarea>
                <button id="submit-answer-btn" class="btn">Save & Mark as Answered</button>
                <button id="delete-post-btn" class="btn" style="background-color: #e53e3e; margin-top: 1rem;">Delete
                    Question</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Scripts (Compat for file:// access) -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="admin.js"></script>
</body>

</html>
